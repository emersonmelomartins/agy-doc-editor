name: docsi
services:
  - name: api
    type: web
    git:
      branch: codex/rebuild-fastify-sqlite-supabase-sync
      docker:
        dockerfile: apps/api/Dockerfile
    ports:
      - port: 3333
        protocol: http
    env:
      - key: HOST
        value: 0.0.0.0
      - key: SQLITE_PATH
        value: /tmp/docsi.db
      - key: SUPABASE_URL
        value: ""
      - key: SUPABASE_ANON_KEY
        value: ""
