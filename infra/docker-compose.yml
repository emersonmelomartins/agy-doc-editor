services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3333
      HOST: 0.0.0.0
      SQLITE_PATH: /data/docsi.db
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    volumes:
      - api-data:/data
    ports:
      - "3333:3333"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  api-data:
